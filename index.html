<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.png" />
    <title>Stranger-Trivia</title>

    <style>
      /* Quiza esto es mala practica, pero que mas da */
      button {
        border: 0;
        background: inherit;
        color: inherit;
      }
    </style>
  </head>
  <body>
    <audio id="bg-music" src="./src/assets/main-theme.mp3" loop></audio>
    <audio id="sounds-correct" src="./src/assets/success_bell.mp3"></audio>
    <audio id="sounds-wrong" src="./src/assets/fail.mp3"></audio>
    <audio id="sounds-finish" src="./src/assets/tada.mp3"></audio>

    <main class="container">
      <div class="screen start">
        <div class="start--content">
          <div class="start--title">
            <p class="title-line">¿Qué tanto de</p>
            <h1 class="title-main"><span>S</span>trange<span>r</span></h1>
            <h2 class="title-raras">Things</h2>
            <p class="title-line">sabes?</p>
          </div>

          <p class="start--message">
            Bienvenidos a Hawkins.<br />
            Los amigos no mienten y<br />
            Si escuchas un reloj, corre.
          </p>

          <button class="start--btn">Empezar</button>
        </div>
      </div>

      <div class="screen quiz hidden">
        <header class="quiz--header">
          <span class="quiz--level"
            >Nivel: <span id="level-name">Fácil</span></span
          >
          <span class="quiz--score">Puntuación: <span id="score">0</span></span>
        </header>

        <div class="quiz--progress">
          <p id="question-number">Pregunta 1/15</p>
          <div class="quiz--progress-bar">
            <div class="quiz--progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <article class="quiz--question" id="question-card">
          <p class="quiz--question-text" id="question-text"></p>
          <div class="quiz--options" id="options"></div>
        </article>

        <div class="quiz--feedback hidden" id="feedback">
          <p id="feedback-text"></p>
          <button id="next-btn">Siguiente</button>
        </div>

        <button class="quiz--back hidden" id="back-btn">
          Volver al inicio
        </button>
      </div>

      <div class="modal-overlay hidden" id="level-modal">
        <div class="modal">
          <h2 class="modal--title" id="modal-title">Nuevo Nivel</h2>
          <p class="modal--message" id="modal-message"></p>
          <button class="modal--btn" id="modal-btn">Continuar</button>
        </div>
      </div>

      <div class="screen results hidden" id="results-screen">
        <h2>¡Juego Terminado!</h2>
        <p class="results--score">
          Puntuación final: <span id="final-score">0</span>
        </p>
        <p class="results--message" id="results-message"></p>
        <button id="restart-btn">Jugar de nuevo</button>
      </div>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
